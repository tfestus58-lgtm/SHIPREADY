<style>
*,*::before,*::after{box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f9fb;color:#0d2145;margin:0;padding:0;-webkit-font-smoothing:antialiased}

/* ── GLASS ── */
.glass{background:rgba(255,255,255,0.65);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.35);border-radius:20px;box-shadow:0 8px 32px rgba(13,33,69,0.08)}

/* ── BUTTONS ── */
.btn-green{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#2d8a5e;color:#fff;border:none;border-radius:50px;padding:11px 24px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(45,138,94,0.30);transition:transform .15s,box-shadow .15s,background .15s}
.btn-green:hover{background:#236b49;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,138,94,0.38)}
.btn-green:active{transform:translateY(0)}
.btn-green:disabled{opacity:.6;cursor:default;transform:none}

.btn-navy{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#0d2145;color:#fff;border:none;border-radius:50px;padding:11px 24px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(13,33,69,0.20);transition:transform .15s,box-shadow .15s,background .15s}
.btn-navy:hover{background:#162f5e;transform:translateY(-1px)}
.btn-navy:active{transform:translateY(0)}
.btn-navy:disabled{opacity:.5;cursor:default;transform:none}

.btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:transparent;color:#0d2145;border:1.5px solid #e2e8f0;border-radius:50px;padding:9px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .15s,border-color .15s,background .15s}
.btn-outline:hover{border-color:#0d2145;background:rgba(13,33,69,0.04);transform:translateY(-1px)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap;flex-shrink:0}
.badge-green{background:#e8f5ef;color:#2d8a5e}
.badge-navy{background:rgba(13,33,69,0.08);color:#0d2145}
.badge-amber{background:#fff3cd;color:#856404}
.badge-blue{background:#e8f0fe;color:#1a56db}
.badge-red{background:#fde8e8;color:#c81e1e}
.badge-grey{background:rgba(13,33,69,0.07);color:rgba(13,33,69,0.55)}

/* ── LABEL ── */
.lbl{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:rgba(13,33,69,0.48)}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,#f0f2f6 25%,#e8eaf0 50%,#f0f2f6 75%);background-size:200% 100%;animation:sk 1.5s infinite linear;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── NAV ── */
.nav-link{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.52);text-decoration:none;transition:background .15s,color .15s;cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
.nav-link:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.88)}
.nav-link.active{background:rgba(45,138,94,0.22);color:#fff;border-left:3px solid #3dbd7a;padding-left:10px}

/* ── MOBILE MENU ── */
.slide-in{transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.slide-in.open{transform:translateX(0)}
.dim{opacity:0;pointer-events:none;transition:opacity .28s}
.dim.open{opacity:1;pointer-events:all}

/* ── PURCHASE CARD ── */
.purchase-card{border-radius:20px;padding:20px;margin-bottom:14px;transition:box-shadow .2s,transform .2s}
.purchase-card:hover{box-shadow:0 10px 40px rgba(13,33,69,0.12);transform:translateY(-1px)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:56px 24px}

/* ── BLOBS ── */
.blob-n{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(13,33,69,0.09) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.blob-g{position:absolute;width:440px;height:440px;background:radial-gradient(circle,rgba(45,138,94,0.07) 0%,transparent 70%);bottom:-60px;left:-80px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}

/* ── FADE UP ── */
.fu{opacity:0;transform:translateY(18px);animation:fu .45s ease forwards}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.fu-1{animation-delay:.05s}.fu-2{animation-delay:.12s}.fu-3{animation-delay:.19s}

/* ── RESPONSIVE ── */
@media(min-width:1024px){
  #sidebar{display:flex!important}
  #hamburger{display:none!important}
  #main-wrap{margin-left:248px;width:calc(100% - 248px);max-width:none;overflow-x:visible}
}
@media(min-width:768px){

}

<style id="mobile-first-patch">
/* 1. HTML + BODY — no horizontal scroll on any device */
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; }

/* 1b. BLOB CONTAINMENT — clip oversized decorative blobs so they
        cannot push scrollable width past the viewport on mobile */
#page-content { overflow: hidden !important; }

/* 2. SIDEBAR — safe area on desktop */
#sidebar {
  height: 100dvh !important;
  max-height: 100dvh !important;
  padding-top: max(30px, env(safe-area-inset-top)) !important;
  padding-bottom: max(20px, env(safe-area-inset-bottom)) !important;
}

/* 3. PAGE CONTENT — proper mobile padding, no bleed */
#page-content {
  padding-left: 18px !important;
  padding-right: 18px !important;
  min-height: 100dvh !important;
}

/* 4. HAMBURGER — always visible on mobile, proper tap size */
#hamburger {
  display: flex !important;
  min-width: 44px !important;
  min-height: 44px !important;
}
@media (min-width: 1024px) {
  #hamburger { display: none !important; }
  #sidebar { display: flex !important; }
}

/* 5. LOADING OVERLAY — full screen properly
   NOTE: uses explicit top/right/bottom/left rather than the `inset`
   shorthand. Some Android WebView builds (this app runs inside a
   Capacitor WebView, not a regular mobile browser tab) don't reliably
   apply `inset` as a shorthand — when that happens the box has no
   anchored top/bottom, so position:fixed sizes it by its own content
   instead of stretching to the full viewport, and it ends up sitting
   low on screen instead of covering it. Longhand properties have much
   broader support and produce the exact same result everywhere else. */


/* 6. NAV LINKS — prevent text overflow in sidebar */
.nav-link {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* 7. MODALS — full width on mobile */
@media (max-width: 600px) {
  .modal-box {
    max-width: 100% !important;
    border-radius: 18px !important;
    padding: 24px 16px !important;
  }
}

/* 8. PURCHASE CARDS — comfortable on small screens */
@media (max-width: 479px) {
  .purchase-card { padding: 16px !important; }
}

/* 9. DESKTOP TABLE — hidden on mobile, shown on desktop */
#desktop-purchases { display: none !important; }
#mobile-purchases  { display: block !important; }
@media (min-width: 768px) {
  #desktop-purchases { display: block !important; }
  #mobile-purchases  { display: none !important; }
}

/* 10. DESKTOP TABLE ROW hover */
.tbl-row { transition: background .15s; }
.tbl-row:hover { background: rgba(13,33,69,0.02); }
.tbl-row + .tbl-row { border-top: 1px solid #f0f2f6; }
</style>

<!-- ═══════════════════════════════════════════════════
     SITE BANNER — reads config/banner from Firestore
     Do not remove. Managed via admin > Site Banner.
═══════════════════════════════════════════════════ -->
<div id="site-banner" style="display:none;width:100%;box-sizing:border-box;"></div>
<div id="site-banner-backdrop" style="display:none;position:fixed;inset:0;background:rgba(13,33,69,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9998;" onclick="window._dismissSiteBanner&&window._dismissSiteBanner()"></div>
<script>
(function(){
  var MAX_WAIT=8000,POLL_INT=80,elapsed=0;
  function renderBanner(data){
    var ms=data.publishedAt&&data.publishedAt.toMillis?data.publishedAt.toMillis():(data.publishedAt||0);
    var dismissKey='dismissed_banner_'+ms;
    if(data.dismissible&&localStorage.getItem(dismissKey)==='1')return;
    var style=data.style||'info';
    var mode=data.displayMode||'strip';
    var themes={
      info:   {bg:'#dbeafe',border:'rgba(59,130,246,0.35)',text:'#1e3a5f',btn:'#3b82f6',btnText:'#fff'},
      warning:{bg:'#fef9c3',border:'rgba(202,138,4,0.35)', text:'#713f12',btn:'#ca8a04',btnText:'#fff'},
      success:{bg:'#dcfce7',border:'rgba(22,163,74,0.35)', text:'#14532d',btn:'#16a34a',btnText:'#fff'}
    };
    var t=themes[style]||themes.info;
    function dismiss(){
      if(data.dismissible)localStorage.setItem(dismissKey,'1');
      document.getElementById('site-banner').style.display='none';
      document.getElementById('site-banner-backdrop').style.display='none';
    }
    window._dismissSiteBanner=dismiss;
    var closeBtn=data.dismissible
      ?'<button onclick="window._dismissSiteBanner()" aria-label="Dismiss" style="flex-shrink:0;min-width:44px;min-height:44px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;color:'+t.text+';padding:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
      :'';
    var ctaBtn=(data.ctaLabel&&data.ctaUrl)
      ?'<a href="'+data.ctaUrl+'" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;white-space:nowrap;padding:8px 18px;background:'+t.btn+';color:'+t.btnText+';border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;flex-shrink:0;">'+data.ctaLabel+'</a>'
      :'';
    var banner=document.getElementById('site-banner');
    var backdrop=document.getElementById('site-banner-backdrop');
    if(mode==='modal'){
      banner.style.cssText=['display:none','position:fixed','top:50%','left:50%','transform:translate(-50%,-50%)','z-index:9999','width:calc(100% - 32px)','max-width:480px','box-sizing:border-box','flex-direction:column','gap:12px','background:'+t.bg,'border:1.5px solid '+t.border,'border-radius:20px','padding:24px 20px 20px','box-shadow:0 20px 60px rgba(13,33,69,0.22)'].join(';');
      banner.innerHTML='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;"><span style="font-size:17px;font-weight:800;color:'+t.text+';line-height:1.3;flex:1;">'+(data.title||'')+'</span>'+closeBtn+'</div>'+(data.body?'<p style="font-size:14px;font-weight:500;color:'+t.text+';margin:0;line-height:1.6;opacity:0.85;">'+data.body+'</p>':'')+(ctaBtn?'<div>'+ctaBtn+'</div>':'');
      setTimeout(function(){
        if(localStorage.getItem(dismissKey)!=='1'){
          banner.style.display='flex';
          backdrop.style.display='block';
        }
      },1500);
    } else {
      banner.style.cssText=['display:flex','width:100%','box-sizing:border-box','align-items:center','justify-content:space-between','gap:10px','background:'+t.bg,'border-bottom:1.5px solid '+t.border,'padding:10px 16px','flex-wrap:wrap'].join(';');
      banner.innerHTML='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;flex:1;min-width:0;"><span style="font-size:14px;font-weight:700;color:'+t.text+';white-space:nowrap;">'+(data.title||'')+'</span>'+(data.body?'<span style="font-size:13px;font-weight:500;color:'+t.text+';opacity:0.80;line-height:1.5;">'+data.body+'</span>':'')+ctaBtn+'</div>'+closeBtn;
    }
  }
  function tryLoad(){
    if(window.db){
      var _imp=window.firestore||null;
      if(_imp&&_imp.getDoc&&_imp.doc){
        _imp.getDoc(_imp.doc(window.db,'config','banner')).then(function(snap){
          if(snap.exists()){var d=snap.data();if(d.active===true)renderBanner(d);}
        }).catch(function(){});
      } else {
        import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(function(m){
          m.getDoc(m.doc(window.db,'config','banner')).then(function(snap){
            if(snap.exists()){var d=snap.data();if(d.active===true)renderBanner(d);}
          }).catch(function(){});
        }).catch(function(){});
      }
      return;
    }
    elapsed+=POLL_INT;
    if(elapsed<MAX_WAIT)setTimeout(tryLoad,POLL_INT);
  }
  setTimeout(tryLoad,120);
})();
</script>

// Holds the Firestore onSnapshot unsubscribe fn so we can clean up on leave.
var _purchasesUnsub = null;

async function loadPurchases(uid, user) {
  var wrap = document.getElementById('purchases-wrap');

  // Show skeleton while loading
  wrap.innerHTML = renderSkeleton();
  document.body.style.visibility = 'visible';

  if (!window.db || !window._fsQ) {
    wrap.innerHTML = renderEmpty('Could not connect to database. Please refresh.');
    return;
  }

  var fsQ = window._fsQ;

  // ── Guest / legacy orders fetch (server-side, non-realtime) ──────────────
  // Done once up-front; result merged into every snapshot render below.
  var guestPurchases = [];
  if (user) {
    try {
      var idToken = await user.getIdToken();
      var res = await fetch('/.netlify/functions/get-guest-purchases', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + idToken },
        body: JSON.stringify({})
      });
      var guestData = await res.json();
      if (guestData && guestData.success && Array.isArray(guestData.orders)) {
        guestData.orders.forEach(function(o) {
          guestPurchases.push(buildPurchase(o.id, o));
        });
      } else if (guestData && guestData.error) {
        console.warn('[loadPurchases] get-guest-purchases:', guestData.error);
      }
    } catch(e2) {
      console.warn('[loadPurchases] get-guest-purchases request failed (non-fatal):', e2);
    }
  }

  // ── Helper: merge snapshot docs + guest orders, sort, render ─────────────
  function handleSnap(snap) {
    var purchases = [];
    var seenIds = {};
    snap.docs.forEach(function(d) {
      seenIds[d.id] = true;
      purchases.push(buildPurchase(d.id, d.data()));
    });
    // Merge guest/legacy orders not already in the snapshot
    guestPurchases.forEach(function(gp) {
      if (!seenIds[gp.id]) {
        seenIds[gp.id] = true;
        purchases.push(gp);
      }
    });
    purchases.sort(function(a, b) { return b._ts - a._ts; });
    window._PURCHASES = purchases;
    renderPurchases(purchases);
  }

  // ── Primary query: buyerUid + paymentStatus + createdAt (needs composite index) ──
  function subscribePrimary() {
    var q = fsQ.query(
      fsQ.collection(window.db, 'product-orders'),
      fsQ.where('buyerUid', '==', uid),
      fsQ.where('paymentStatus', '==', 'paid'),
      fsQ.orderBy('createdAt', 'desc')
    );
    _purchasesUnsub = fsQ.onSnapshot(q, function(snap) {
      handleSnap(snap);
    }, function(err) {
      // Index not yet built — fall back to a simpler query (buyerUid + createdAt only)
      // so the buyer can still see all their orders while the index propagates.
      if (err && (err.code === 'failed-precondition' || /FAILED_PRECONDITION/i.test(err.message || ''))) {
        console.warn('[loadPurchases] Composite index not ready, using fallback query:', err.message);
        subscribeFallback();
      } else {
        console.error('[loadPurchases]', err);
        wrap.innerHTML = renderEmpty('Could not load purchases. Please try again.');
      }
    });
  }

  // ── Fallback query: buyerUid + createdAt only (no index required) ─────────
  // Filters paymentStatus client-side so unpaid orders are still excluded.
  function subscribeFallback() {
    // Clean up any previous listener before starting a new one
    if (_purchasesUnsub) { try { _purchasesUnsub(); } catch(e) {} _purchasesUnsub = null; }

    var qFallback = fsQ.query(
      fsQ.collection(window.db, 'product-orders'),
      fsQ.where('buyerUid', '==', uid),
      fsQ.orderBy('createdAt', 'desc')
    );
    _purchasesUnsub = fsQ.onSnapshot(qFallback, function(snap) {
      // Client-side filter: keep only paid orders (mirrors the primary query's where clause)
      var filtered = { docs: snap.docs.filter(function(d) { return d.data().paymentStatus === 'paid'; }) };
      handleSnap(filtered);
    }, function(err) {
      console.error('[loadPurchases] fallback query failed:', err);
      wrap.innerHTML = renderEmpty('Could not load purchases. Please try again.');
    });
  }

  subscribePrimary();

  // Clean up listener when the user navigates away.
  // pagehide fires reliably on iOS Safari (beforeunload is suppressed
  // when the page enters the back/forward cache on mobile browsers).
  window.addEventListener('pagehide', function() {
    if (_purchasesUnsub) { try { _purchasesUnsub(); } catch(e) {} }
  });
}

// ══════════════════════════════════════════
//  BUILD PURCHASE OBJECT FROM FIRESTORE DOC
// ══════════════════════════════════════════
function buildPurchase(id, data) {
  var ts = data.createdAt;
  var tsMs = ts ? (ts.toDate ? ts.toDate().getTime() : new Date(ts).getTime()) : 0;
  var dateStr = tsMs
    ? new Date(tsMs).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })
    : '—';

  // Resolve access content — check multiple possible field names sellers may write
  var accessUrl = data.deliveryContent
    || data.fileUrl
    || data.deliveryFileUrl
    || data.courseUrl
    || data.coachingCalUrl
    || data.redirectUrl
    || null;

  return {
    id:             id,
    _ts:            tsMs,
    productTitle:   data.productTitle   || 'Digital Product',
    sellerName:     data.sellerName     || 'Seller',
    sellerUid:      data.sellerUid      || null,
    amount:         data.amount         || 0,
    currency:       data.currency       || 'USD',
    paymentMethod:  data.paymentMethod  || 'Card / Crypto',
    date:           dateStr,
    // Fix E — deliver-product.js marks deliveryDispatchFailed:true when
    // crediting the seller / granting access failed after retries. That
    // flag previously had no effect anywhere — the buyer just saw the same
    // amber "Pending" badge as an ordinary manual-delivery order still
    // waiting on the seller, with no way to tell the two apart and no path
    // to get help. deliveryFailed below drives a distinct status so this
    // case is visible and actionable instead of silently stuck.
    deliveryFailed: data.deliveryDispatchFailed === true,
    deliveryStatus: data.deliveryStatus || (accessUrl ? 'delivered' : 'pending'),
    deliveryType:   data.deliveryType   || null,
    accessUrl:      accessUrl,
    productId:      data.productId      || null
  };
}

// ══════════════════════════════════════════
//  FORMAT CURRENCY
// ══════════════════════════════════════════
function formatAmt(amount, currency) {
  var sym = { USD:'$', GBP:'£', EUR:'€', NGN:'₦' }[currency] || (currency ? currency + ' ' : '$');
  var n = parseFloat(amount) || 0;
  return sym + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ══════════════════════════════════════════
//  DELIVERY BADGE
// ══════════════════════════════════════════
function deliveryBadge(status, deliveryFailed) {
  if (deliveryFailed) {
    return '<span class="badge badge-red">Delivery issue — contact support</span>';
  }
  if (status === 'delivered') {
    return '<span class="badge badge-green">Delivered</span>';
  }
  if (status === 'pending') {
    return '<span class="badge badge-amber">Pending</span>';
  }
  return '<span class="badge badge-grey">' + escHtml(status || 'Unknown') + '</span>';
}

      accessBtn = '<a href="/course-viewer.html?orderId=' + escHtml(p.id) + '" class="btn-green" style="padding:8px 18px;font-size:12px;white-space:nowrap;text-decoration:none;">'
        + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>'

      + '</a>';
    } else if (p.deliveryStatus === 'delivered' && p.accessUrl) {
      accessBtn = '<a href="' + escHtml(p.accessUrl) + '" target="_blank" rel="noopener noreferrer" class="btn-green" style="padding:8px 18px;font-size:12px;white-space:nowrap;text-decoration:none;">'
        + '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'
        + 'Access Product'
      + '</a>';
    } else if (p.deliveryStatus === 'delivered') {
      accessBtn = '<span style="font-size:12px;font-weight:600;color:#2d8a5e;">✓ Delivered</span>';
    } else {
      accessBtn = '<span style="font-size:12px;font-weight:500;color:rgba(13,33,69,0.45);font-style:italic;">Awaiting delivery</span>';
    }

    return '<div class="tbl-row" style="grid-template-columns:2.5fr 1.3fr 100px 110px 160px;gap:14px;padding:16px 24px;display:grid;align-items:center;">'
      // Product
      + '<div style="min-width:0;">'
        + '<div style="display:flex;align-items:center;gap:11px;">'
          + '<div style="width:40px;height:40px;background:rgba(45,138,94,0.10);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#2d8a5e;">' + PRODUCT_ICON + '</div>'

      + '<span style="font-size:14px;font-weight:800;color:#0d2145;">' + formatAmt(p.amount, p.currency) + '</span>'

      + '<div style="display:flex;justify-content:flex-end;">' + accessBtn + '</div>'

      + '<span class="lbl" style="text-align:right;">Action</span>'

        + 'Delivery issue — tap to contact support'
      + '</a>';
    } else if (isDelivered && p.deliveryType === 'video-course') {
      accessArea = '<a href="/course-viewer.html?orderId=' + escHtml(p.id) + '" class="btn-green" style="width:100%;text-decoration:none;justify-content:center;padding:11px 18px;font-size:13px;margin-top:14px;">'
        + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>'
        + 'Watch Course'
      + '</a>';
    } else if (hasLink) {
      accessArea = '<a href="' + escHtml(p.accessUrl) + '" target="_blank" rel="noopener noreferrer" class="btn-green" style="width:100%;text-decoration:none;justify-content:center;padding:11px 18px;font-size:13px;margin-top:14px;">'
        + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>'
        + 'Access Product'
      + '</a>';
    } else if (isDelivered) {
      accessArea = '<div style="margin-top:12px;padding:10px 14px;background:rgba(45,138,94,0.08);border-radius:10px;font-size:12px;font-weight:600;color:#2d8a5e;display:flex;align-items:center;gap:7px;">'
        + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>'
        + 'Product delivered'
      + '</div>';
    } else {
      accessArea = '<div style="margin-top:12px;padding:10px 14px;background:rgba(133,100,4,0.07);border-radius:10px;font-size:12px;font-weight:600;color:#856404;display:flex;align-items:center;gap:7px;">'
        + '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
        + 'Awaiting delivery from seller'
      + '</div>';
    }

    return '<div class="glass purchase-card">'
      // Row 1: icon + title + badge
      + '<div style="display:flex;align-items:flex-start;gap:12px;">'
        + '<div style="width:44px;height:44px;background:rgba(45,138,94,0.10);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#2d8a5e;">' + PRODUCT_ICON + '</div>'
        + '<div style="flex:1;min-width:0;">'
          + '<div style="font-size:14px;font-weight:700;color:#0d2145;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">' + escHtml(p.productTitle) + '</div>'
          + '<div style="font-size:12px;font-weight:500;color:rgba(13,33,69,0.48);margin-top:3px;">by ' + escHtml(p.sellerName) + '</div>'
        + '</div>'
        + '<div style="flex-shrink:0;margin-top:1px;">' + deliveryBadge(p.deliveryStatus, p.deliveryFailed) + '</div>'
      + '</div>'
      // Row 2: amount + date
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;">'
        + '<div style="font-size:20px;font-weight:800;color:#0d2145;letter-spacing:-0.5px;">' + formatAmt(p.amount, p.currency) + '</div>'
        + '<div style="font-size:12px;font-weight:500;color:rgba(13,33,69,0.48);">' + p.date + '</div>'
      + '</div>'
      // Access area
      + accessArea
    + '</div>';
  }).join('');

  // Mobile section wrapper: visible by default, hidden on desktop via CSS override in mobile-first-patch
  return '<div id="mobile-purchases">' + cards + '</div>';
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderEmpty(msg) {
  return '<div class="glass empty-state">'
    + '<div style="width:60px;height:60px;background:rgba(45,138,94,0.10);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">'
    + '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#2d8a5e" stroke-width="1.8" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>'
    + '</div>'
    + '<div style="font-size:17px;font-weight:700;color:#0d2145;margin-bottom:8px;">No purchases yet</div>'
    + '<div style="font-size:14px;color:rgba(13,33,69,0.55);max-width:280px;margin:0 auto 16px;line-height:1.6;">'
    + (msg || 'Your purchased digital products will appear here.')
    + '</div>'
    + '</div>';
}
</script>

  const FIREBASE_CONFIG = {

  const app  = initializeApp(FIREBASE_CONFIG);
  const auth = getAuth(app);
  window.auth = auth;
  window.handleLogout = function() {
    signOut(auth).then(function(){ window.location.href = '/login.html'; })
      .catch(function(){ window.location.href = '/login.html'; });
  };
  document.getElementById('mb-signout').onclick = window.handleLogout;

  const db   = getFirestore(app);

  window._fsQ = { collection, query, where, orderBy, getDocs, getDoc, doc, onSnapshot };
  loadSupportEmail();
  onAuthStateChanged(auth, function(user) {
    if (!user) { window.location.href = '/login.html'; return; }
    getDoc(doc(db, 'users', user.uid)).then(function(snap) {
      if (!snap.exists()) { window.location.href = '/login.html'; return; }
      var role = snap.data().role;
      // Freelancers can also be buyers on a two-sided marketplace — the
      // freelancer dashboard's own "Purchases" nav link points here. The
      // purchases query is keyed by buyerUid/buyerEmail, never by role, so
      // there's nothing buyer-specific this page actually needs to enforce.
      // Only admins (who manage the platform, not shop on it) and anyone
      // with no recognised role get redirected elsewhere.
      if (role !== 'buyer' && role !== 'freelancer') {
        if (role === 'admin') window.location.href = '/admin.html';
        else window.location.href = '/login.html';
        return;
      }
      if (typeof window._boot === 'function') window._boot(user, snap.data());
    }).catch(function(err) {
      // Fix 10: a transient Firestore/network error here does NOT mean the
      // user is logged out (Firebase Auth session is untouched) — only
      // redirect to login on a real auth failure. Otherwise keep the user
      // on the page and let them retry.
      console.error('[buyer-purchases] Profile check failed — keeping session, not logging out:', err);
      document.body.style.visibility = 'visible';
      if (!document.getElementById('auth-retry-banner')) {
        var b = document.createElement('div');
        b.id = 'auth-retry-banner';
        b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#1f2937;color:#fff;padding:10px 14px;font-size:13px;line-height:1.4;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.2);';
        var m = document.createElement('span');
        m.textContent = "Couldn't load your session. Check your connection and retry.";
        var btn = document.createElement('button');
        btn.textContent = 'Retry';
        btn.style.cssText = 'background:#fff;color:#1f2937;border:none;border-radius:6px;padding:6px 12px;font-size:13px;font-weight:600;flex-shrink:0;';
        btn.onclick = function(){ window.location.reload(); };
        b.appendChild(m); b.appendChild(btn);
        document.body.appendChild(b);
      }
    });
  });
