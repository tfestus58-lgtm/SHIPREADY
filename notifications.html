<style>
*,*::before,*::after{box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f9fb;color:#0d2145;margin:0;padding:0;-webkit-font-smoothing:antialiased}

/* Glass */
.glass{background:rgba(255,255,255,0.65);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.35);border-radius:20px;box-shadow:0 8px 32px rgba(13,33,69,0.08)}

/* Buttons */
.btn-green{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#2d8a5e;color:#fff;border:none;border-radius:50px;padding:9px 20px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(45,138,94,0.28);transition:transform .15s,box-shadow .15s,background .15s}
.btn-green:hover{background:#236b49;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,138,94,0.38)}
.btn-green:active{transform:translateY(0)}
.btn-ghost{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:transparent;color:rgba(13,33,69,0.52);border:1.5px solid #e2e8f0;border-radius:50px;padding:8px 18px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .15s}
.btn-ghost:hover{border-color:#0d2145;color:#0d2145;background:rgba(13,33,69,0.04);transform:translateY(-1px)}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.badge-green{background:#e8f5ef;color:#2d8a5e}
.badge-blue{background:#e8f0fe;color:#1a56db}
.badge-amber{background:#fff3cd;color:#856404}
.badge-red{background:#fde8e8;color:#c81e1e}
.badge-grey{background:rgba(13,33,69,0.07);color:rgba(13,33,69,0.55)}
.badge-navy{background:rgba(13,33,69,0.08);color:#0d2145}

/* Label */
.lbl{font-size:11px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase;color:rgba(13,33,69,0.48)}

/* Skeleton */
.sk{background:linear-gradient(90deg,#f0f2f6 25%,#e8eaf0 50%,#f0f2f6 75%);background-size:200% 100%;animation:sk 1.5s infinite linear;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Nav */
.nav-link{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.52);text-decoration:none;transition:background .15s,color .15s;cursor:pointer;border:none;background:transparent;width:100%;text-align:left}
.nav-link:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.88)}
.nav-link.active{background:rgba(45,138,94,0.22);color:#fff;border-left:3px solid #3dbd7a;padding-left:10px}

/* Mobile menu */
.slide-in{transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.slide-in.open{transform:translateX(0)}
.dim{opacity:0;pointer-events:none;transition:opacity .28s}
.dim.open{opacity:1;pointer-events:all}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#091830;color:#fff;border-radius:50px;padding:11px 22px;font-size:13px;font-weight:600;z-index:3000;opacity:0;pointer-events:none;transition:transform .25s,opacity .25s;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Blobs */
.blob-n{position:absolute;width:min(500px,100vw);height:min(500px,100vw);background:radial-gradient(circle,rgba(13,33,69,0.09) 0%,transparent 70%);top:-100px;right:-40px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.blob-g{position:absolute;width:min(440px,100vw);height:min(440px,100vw);background:radial-gradient(circle,rgba(45,138,94,0.07) 0%,transparent 70%);bottom:-60px;left:-40px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}

/* Fade up */
.fu{opacity:0;transform:translateY(18px);animation:fu .45s ease forwards}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.fu-1{animation-delay:.05s}.fu-2{animation-delay:.12s}.fu-3{animation-delay:.19s}

/* Notification item */
.notif-item{display:flex;gap:16px;padding:18px 20px;border-bottom:1px solid #e2e8f0;cursor:pointer;transition:background .15s;position:relative;text-decoration:none;color:inherit}
.notif-item:last-child{border-bottom:none}
.notif-item:hover{background:rgba(13,33,69,0.025)}
.notif-item:active{background:rgba(13,33,69,0.04)}
.notif-item.unread{background:rgba(232,245,239,0.45)}
.notif-item.unread:hover{background:rgba(232,245,239,0.70)}

/* Timeline connector */
.notif-timeline{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding-top:3px}
.notif-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;transition:transform .15s}
.notif-item:hover .notif-dot{transform:scale(1.2)}
.notif-dot.unread{background:#2d8a5e;box-shadow:0 0 0 3px rgba(45,138,94,0.18)}
.notif-dot.read{background:#e2e8f0;border:1.5px solid #cbd5e1}
.notif-line{width:1.5px;flex:1;margin-top:6px;min-height:24px}
.notif-line.unread{background:linear-gradient(to bottom,rgba(45,138,94,0.35),rgba(45,138,94,0.05))}
.notif-line.read{background:#f0f2f6}

/* Content */
.notif-content{flex:1;min-width:0}
.notif-title{font-size:14px;line-height:1.4;margin:0 0 4px;word-break:break-word}
.notif-title.unread{font-weight:700;color:#0d2145}
.notif-title.read{font-weight:500;color:rgba(13,33,69,0.72)}
.notif-body{font-size:13px;font-weight:400;color:rgba(13,33,69,0.52);line-height:1.55;margin:0 0 6px;word-break:break-word}
.notif-time{font-size:11px;font-weight:500;color:rgba(13,33,69,0.38);display:flex;align-items:center;gap:5px}
.notif-time.unread{color:rgba(45,138,94,0.80)}

/* Category pill on notification */
.notif-type{display:inline-flex;align-items:center;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;margin-bottom:5px}

/* Filter tabs */
.filter-tab{padding:7px 16px;border-radius:50px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.filter-tab.active{background:#0d2145;color:#fff;border-color:#0d2145}
.filter-tab:not(.active){background:transparent;color:rgba(13,33,69,0.52);border-color:#e2e8f0}
.filter-tab:not(.active):hover{border-color:#0d2145;color:#0d2145}

/* Responsive */
@media(min-width:1024px){
  #sidebar{display:flex!important}
  #hamburger{display:none!important}
  #main-wrap{margin-left:248px!important;width:calc(100% - 248px)!important}
  #page-content{padding:36px 40px!important;max-width:100%!important}
  #page-content > div > div[style*="z-index:1"]{max-width:860px;margin:0 auto}
}
@media(min-width:768px) and (max-width:1023px){
  #page-content{padding:28px 24px!important}
}
</style>

}

<!-- ═══════════════════════════════════════════════════
     SITE BANNER — reads config/banner from Firestore
     Do not remove. Managed via admin > Site Banner.
═══════════════════════════════════════════════════ -->
<div id="site-banner" style="display:none;width:100%;box-sizing:border-box;"></div>
<div id="site-banner-backdrop" style="display:none;position:fixed;inset:0;background:rgba(13,33,69,0.55);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:9998;" onclick="window._dismissSiteBanner&&window._dismissSiteBanner()"></div>
<script>
(function(){
  var MAX_WAIT=8000,POLL_INT=80,elapsed=0;
  function renderBanner(data){
    var ms=data.publishedAt&&data.publishedAt.toMillis?data.publishedAt.toMillis():(data.publishedAt||0);
    var dismissKey='dismissed_banner_'+ms;
    if(data.dismissible&&localStorage.getItem(dismissKey)==='1')return;
    var style=data.style||'info';
    var mode=data.displayMode||'strip';
    var themes={
      info:   {bg:'#dbeafe',border:'rgba(59,130,246,0.35)',text:'#1e3a5f',btn:'#3b82f6',btnText:'#fff'},
      warning:{bg:'#fef9c3',border:'rgba(202,138,4,0.35)', text:'#713f12',btn:'#ca8a04',btnText:'#fff'},
      success:{bg:'#dcfce7',border:'rgba(22,163,74,0.35)', text:'#14532d',btn:'#16a34a',btnText:'#fff'}
    };
    var t=themes[style]||themes.info;
    function dismiss(){
      if(data.dismissible)localStorage.setItem(dismissKey,'1');
      document.getElementById('site-banner').style.display='none';
      document.getElementById('site-banner-backdrop').style.display='none';
    }
    window._dismissSiteBanner=dismiss;
    var closeBtn=data.dismissible
      ?'<button onclick="window._dismissSiteBanner()" aria-label="Dismiss" style="flex-shrink:0;min-width:44px;min-height:44px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;color:'+t.text+';padding:0;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>'
      :'';
    var ctaBtn=(data.ctaLabel&&data.ctaUrl)
      ?'<a href="'+data.ctaUrl+'" target="_blank" rel="noopener noreferrer" style="display:inline-flex;align-items:center;white-space:nowrap;padding:8px 18px;background:'+t.btn+';color:'+t.btnText+';border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;flex-shrink:0;">'+data.ctaLabel+'</a>'
      :'';
    var banner=document.getElementById('site-banner');
    var backdrop=document.getElementById('site-banner-backdrop');
    if(mode==='modal'){
      banner.style.cssText=['display:none','position:fixed','top:50%','left:50%','transform:translate(-50%,-50%)','z-index:9999','width:calc(100% - 32px)','max-width:480px','box-sizing:border-box','flex-direction:column','gap:12px','background:'+t.bg,'border:1.5px solid '+t.border,'border-radius:20px','padding:24px 20px 20px','box-shadow:0 20px 60px rgba(13,33,69,0.22)'].join(';');
      banner.innerHTML='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;"><span style="font-size:17px;font-weight:800;color:'+t.text+';line-height:1.3;flex:1;">'+(data.title||'')+'</span>'+closeBtn+'</div>'+(data.body?'<p style="font-size:14px;font-weight:500;color:'+t.text+';margin:0;line-height:1.6;opacity:0.85;">'+data.body+'</p>':'')+(ctaBtn?'<div>'+ctaBtn+'</div>':'');
      setTimeout(function(){
        if(localStorage.getItem(dismissKey)!=='1'){
          banner.style.display='flex';
          backdrop.style.display='block';
        }
      },1500);
    } else {
      banner.style.cssText=['display:flex','width:100%','box-sizing:border-box','align-items:center','justify-content:space-between','gap:10px','background:'+t.bg,'border-bottom:1.5px solid '+t.border,'padding:10px 16px','flex-wrap:wrap'].join(';');
      banner.innerHTML='<div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px 14px;flex:1;min-width:0;"><span style="font-size:14px;font-weight:700;color:'+t.text+';white-space:nowrap;">'+(data.title||'')+'</span>'+(data.body?'<span style="font-size:13px;font-weight:500;color:'+t.text+';opacity:0.80;line-height:1.5;">'+data.body+'</span>':'')+ctaBtn+'</div>'+closeBtn;
    }
  }
  function tryLoad(){
    if(window.db){
      var _imp=window.firestore||null;
      if(_imp&&_imp.getDoc&&_imp.doc){
        _imp.getDoc(_imp.doc(window.db,'config','banner')).then(function(snap){
          if(snap.exists()){var d=snap.data();if(d.active===true)renderBanner(d);}
        }).catch(function(){});
      } else {
        import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js').then(function(m){
          m.getDoc(m.doc(window.db,'config','banner')).then(function(snap){
            if(snap.exists()){var d=snap.data();if(d.active===true)renderBanner(d);}
          }).catch(function(){});
        }).catch(function(){});
      }
      return;
    }
    elapsed+=POLL_INT;
    if(elapsed<MAX_WAIT)setTimeout(tryLoad,POLL_INT);
  }
  setTimeout(tryLoad,120);
})();
</script>

        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#0d2145" stroke-width="2" stroke-linecap="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>

// ─── NOTIFICATION DATA ────────────────────────────────────────────────────────
let currentFilter = 'all';
let notifications = [];

// ─── TYPE CONFIG ──────────────────────────────────────────────────────────────
const TYPE_CONFIG = {
  payment: { label:'Payment', color:'#2d8a5e', bg:'#e8f5ef' },
  project: { label:'Project', color:'#1a56db', bg:'#e8f0fe' },
  account: { label:'Account', color:'#856404', bg:'#fff3cd' },
  admin:   { label:'Admin',   color:'#7c3aed', bg:'#f3e8ff' },
};
function relTime(ts) {
  const diff = (Date.now() - ts) / 1000;
  if (diff < 60) return 'Just now';
  if (diff < 3600) return `${Math.floor(diff/60)} min ago`;
  if (diff < 86400) return `${Math.floor(diff/3600)} hr ago`;
  if (diff < 172800) return 'Yesterday';
  const days = Math.floor(diff/86400);
  if (days < 7) return `${days} days ago`;
  return new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}

// ─── SANITIZATION (FIX — audit finding N1) ──────────────────────────────────
// notif.title/body/url/id can originate from send-push-notification.js or
// send-smart-notification.js, both of which pass caller-supplied text
// straight through. These were previously interpolated unescaped into
// innerHTML (title/body) and into an inline onclick="..." attribute
// (id/url), which is a stored-XSS path. escHtml() neutralizes HTML/attribute
// injection; escJsString() additionally neutralizes the JS-string-literal
// context the onclick attribute sits in. Apply escJsString() first, then
// wrap the result in escHtml() — the browser HTML-decodes the attribute
// before handing it to the JS parser, so escHtml() is what's actually
// "outermost" at render time.
function escHtml(str) {
  return String(str == null ? '' : str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function escJsString(str) {
  return String(str == null ? '' : str)
    .replace(/\\/g, '\\\\')
    .replace(/'/g, "\\'")
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r');
}

// Only allow navigating to http(s) targets — blocks javascript:/data:/vbscript:
// URLs that could otherwise execute on notification click.
function isSafeNotifUrl(url) {
  if (!url) return false;
  try {
    const resolved = new URL(url, window.location.origin);
    return resolved.protocol === 'http:' || resolved.protocol === 'https:';
  } catch {
    return false;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function getFiltered() {
  if (currentFilter === 'all') return notifications;
  if (currentFilter === 'unread') return notifications.filter(n => !n.read);
  return notifications.filter(n => n.type === currentFilter);
}

function renderNotifications() {
  const list = document.getElementById('notif-list');
  const empty = document.getElementById('notif-empty');
  const filterEmpty = document.getElementById('notif-filter-empty');
  const filtered = getFiltered();
  const unreadCount = notifications.filter(n => !n.read).length;

  // Update count label
  const countLabel = document.getElementById('notif-count-label');
  countLabel.textContent = unreadCount > 0 ? `${unreadCount} unread` : 'No unread notifications';

  // Toggle mark all button visibility
  const markAllBtn = document.getElementById('mark-all-btn');
  markAllBtn.style.display = unreadCount > 0 ? 'inline-flex' : 'none';

  // Bell dot is owned exclusively by shared.js's live Firestore listener
  // (setupFCMAndBell) — this page must not also write to #bell-dot, since
  // two writers on the same element from different data sources (this
  // page's local one-time-fetched array vs. shared.js's real-time
  // onSnapshot) is what caused the dot to show stale/incorrect state.

  if (notifications.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'block';
    filterEmpty.style.display = 'none';
    return;
  }

  if (filtered.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'none';
    filterEmpty.style.display = 'block';
    return;
  }

  empty.style.display = 'none';
  filterEmpty.style.display = 'none';
  list.style.display = 'block';

  list.innerHTML = filtered.map((n, i) => {
    const type = TYPE_CONFIG[n.type] || TYPE_CONFIG.account;
    const isLast = i === filtered.length - 1;
    const readClass = n.read ? 'read' : 'unread';

    return `
    <div class="notif-item ${readClass}" onclick="handleNotifClick('${escHtml(escJsString(n.id))}', '${escHtml(escJsString(n.url || ''))}')">
      <div class="notif-timeline">
        <div class="notif-dot ${readClass}"></div>
        ${!isLast ? `<div class="notif-line ${readClass}"></div>` : ''}
      </div>
      <div class="notif-content">
        <div style="display:inline-flex;align-items:center;padding:2px 8px;border-radius:50px;font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;background:${type.bg};color:${type.color};margin-bottom:5px;">${type.label}</div>
        <p class="notif-title ${readClass}">${escHtml(n.title)}</p>
        <p class="notif-body">${escHtml(n.body)}</p>
        <div class="notif-time ${readClass}">
          ${!n.read ? `<svg width="8" height="8" viewBox="0 0 24 24" fill="#2d8a5e"><circle cx="12" cy="12" r="10"/></svg>` : `<svg width="8" height="8" viewBox="0 0 24 24" fill="rgba(13,33,69,0.25)"><circle cx="12" cy="12" r="10"/></svg>`}
          ${relTime(n.createdAt)}
        </div>
      </div>
    </div>`;
  }).join('');
}

function handleNotifClick(id, url) {
  // Mark as read
  const notif = notifications.find(n => n.id === id);
  if (notif && !notif.read) {
    notif.read = true;
    // In production: update Firestore doc
    renderNotifications();
  }
  // Navigate if URL — only ever to http(s) targets (see isSafeNotifUrl)
  if (url && isSafeNotifUrl(url)) {
    setTimeout(() => { window.location.href = url; }, 100);
  }
}

function markAllAsRead() {
  const unreadExists = notifications.some(n => !n.read);
  if (!unreadExists) return;
  notifications.forEach(n => n.read = true);
  // In production: Firestore batch write setting read=true on all unread docs
  renderNotifications();
  showToast('All notifications marked as read');
}

function filterNotifs(type, btn) {
  currentFilter = type;
  // Update tab styling
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderNotifications();
}

  var logoEl = document.getElementById('sidebar-logo');

  const { collection, query, orderBy, limit, getDocs, updateDoc, doc, writeBatch, onSnapshot } = firestoreModules;
  const uid = user.uid;

  // Show skeleton, then keep notifications live for the rest of the session
  const skeleton = document.getElementById('notif-skeleton');

  if (window._notifUnsubscribe) { window._notifUnsubscribe(); }
  window._notifUnsubscribe = onSnapshot(
    query(
      collection(db, 'users', uid, 'notifications'),
      orderBy('createdAt', 'desc'),
      limit(50)
    ),
    function(snap) {
      notifications = [];
      snap.forEach(function(d) {
        var data = d.data();
        var ts = data.createdAt && data.createdAt.toDate
          ? data.createdAt.toDate().getTime()
          : (typeof data.createdAt === 'number' ? data.createdAt : Date.now());
        notifications.push({
          id: d.id,
          title: data.title || '',
          body: data.body || '',
          type: data.type || 'account',
          read: data.read === true,
          url: data.url || '',
          createdAt: ts
        });
      });
      if (skeleton) skeleton.style.display = 'none';
      renderNotifications();
    },
    function(err) {
      console.warn('Failed to load notifications:', err);
      if (skeleton) skeleton.style.display = 'none';
      notifications = [];
      renderNotifications();
    }
  );

  // pagehide fires reliably on iOS Safari (beforeunload is suppressed
  // when the page enters the back/forward cache on mobile browsers).
  window.addEventListener('pagehide', function() {
    if (window._notifUnsubscribe) { window._notifUnsubscribe(); }
  });

  // Override handleNotifClick to also write to Firestore
  window.handleNotifClick = function(id, url) {
    var notif = notifications.find(function(n) { return n.id === id; });
    if (notif && !notif.read) {
      notif.read = true;
      updateDoc(doc(db, 'users', uid, 'notifications', id), { read: true })
        .catch(function(e) { console.warn('Mark read failed:', e); });
      renderNotifications();
    }
    // Guard against unsafe URLs (javascript:, data:, etc.) — same check as
    // pre-boot handleNotifClick, applied consistently after boot too.
    if (url && isSafeNotifUrl(url)) {
      setTimeout(function() { window.location.href = url; }, 100);
    }
  };

  // Override markAllAsRead to write to Firestore
  window.markAllAsRead = function() {
    var unread = notifications.filter(function(n) { return !n.read; });
    if (!unread.length) return;
    var batch = writeBatch(db);
    unread.forEach(function(n) {
      batch.update(doc(db, 'users', uid, 'notifications', n.id), { read: true });
      n.read = true;
    });
    batch.commit().catch(function(e) { console.warn('Batch mark-read failed:', e); });
    renderNotifications();
    showToast('All notifications marked as read');
  };

  document.body.style.visibility = 'visible';
};
</script>
