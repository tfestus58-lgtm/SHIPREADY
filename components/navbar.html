<script>
(function () {
  /* ── Hamburger toggle ── */
  var burger = document.getElementById('hamburger');
  var mMenu  = document.getElementById('mobile-menu');
  if (burger && mMenu) {
    burger.addEventListener('click', function () {
      mMenu.classList.toggle('open');
    });
  }

  /* ── Auth-aware nav state ── */
  function applyAuthState(user) {
    var pubD  = document.getElementById('nav-public-desktop');
    var authD = document.getElementById('nav-auth-desktop');
    var pubM  = document.getElementById('nav-public-mobile');
    var authM = document.getElementById('nav-auth-mobile');

    if (!user) {
      if (pubD)  pubD.style.display  = 'flex';
      if (authD) authD.style.display = 'none';
      if (pubM)  pubM.style.display  = 'flex';
      if (authM) authM.style.display = 'none';
      return;
    }

    /* Signed-in state */
    if (pubD)  pubD.style.display  = 'none';
    if (authD) authD.style.display = 'flex';
    if (pubM)  pubM.style.display  = 'none';
    if (authM) authM.style.display = 'flex';

    /* Avatar initial */
    var avatarEl = document.getElementById('nav-avatar');
    if (avatarEl) {
      avatarEl.textContent = (user.displayName || user.email || '?')[0].toUpperCase();
    }

    /* Resolve correct dashboard link (buyer vs freelancer) */
    if (window.auth && window.db && window.onAuthStateChanged) {
      (async function () {
        try {
          var fsModule = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
          var snap = await fsModule.getDoc(fsModule.doc(window.db, 'users', user.uid));
          var dashHref = (snap.exists() && snap.data().role === 'buyer')
            ? '/buyer-dashboard.html'
            : '/dashboard.html';
          var dashD = document.getElementById('nav-dash-desktop');
          var dashM = document.getElementById('nav-dash-mobile');
          if (dashD) dashD.href = dashHref;
          if (dashM) dashM.href = dashHref;
        } catch (e) { /* silent — links already default to /dashboard.html */ }
      })();
    }
  }

  /* Run immediately if Firebase is already initialised */
  function listenAuth() {
    function attach() {
      if (window.auth && window.onAuthStateChanged) {
        window.onAuthStateChanged(window.auth, applyAuthState);
      } else if (window.auth && window._onAuthStateChanged) {
        /* Some pages expose a pre-bound wrapper instead of the raw import */
        window._onAuthStateChanged(applyAuthState);
      }
    }

    // Fix 17: the 'kreddlo-firebase-ready' event only fires once and is not
    // replayed. This component is fetched asynchronously (see loadComponent()
    // in shared.js), so it can attach its listener *after* the host page has
    // already dispatched the event — missing it forever and leaving the nav
    // stuck on the logged-out state. window.kreddloFirebaseReady is a
    // persistent flag set at the same moment the event fires, so checking it
    // first makes this work regardless of load order.
    if (window.kreddloFirebaseReady && window.auth) {
      attach();
    } else if (window.auth && (window.onAuthStateChanged || window._onAuthStateChanged)) {
      attach();
    } else {
      /* Wait for the page to initialise Firebase */
      window.addEventListener('kreddlo-firebase-ready', attach, { once: true });
    }
  }

  listenAuth();
})();
</script>
