<script>
(function () {
  /* ── Copyright year ── */
  var yrEls = document.querySelectorAll('.footer-yr');
  var yr = new Date().getFullYear();
  yrEls.forEach(function (el) { el.textContent = yr; });

  /* ── Social links from Firestore config ── */
  function loadSocial() {
    if (!window.db) return;
    (async function () {
      try {
        var fsModule = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
        var snap = await fsModule.getDoc(fsModule.doc(window.db, 'config', 'platform'));
        var s = snap.exists() ? snap.data() : {};
        ['twitter', 'linkedin', 'instagram'].forEach(function (name) {
          var el  = document.getElementById('footer-social-' + name);
          if (!el) return;
          var url = s[name + 'Url'] || '';
          if (url) { el.href = url; el.style.display = 'flex'; }
          else     { el.style.display = 'none'; }
        });
      } catch (e) { /* silent fail — social links stay hidden */ }
    })();
  }

  if (window.db) {
    loadSocial();
  } else {
    window.addEventListener('kreddlo-firebase-ready', loadSocial, { once: true });
  }
})();
</script>
