[build]
  # Issue 1 fix: ADMIN_SECRET is no longer injected into admin.html.
  # Admin API calls now use Firebase ID tokens (Authorization: Bearer <token>).
  # The server verifies the token and checks users/{uid}.role === 'admin'.
  # ADMIN_SECRET env var is no longer required and can be removed from
  # Netlify → Site settings → Environment variables.
  publish  = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."kyc-submit"]
  included_files = []


[functions."scheduled-subscriptions"]
  schedule = "0 */6 * * *"

[functions."scheduled-clear-earnings"]
  schedule = "0 * * * *"

# Hourly cleanup of expired rate-limit counter docs in the rateLimits
# Firestore collection. Backup for when Firestore TTL policy is not
# enabled on the collection. If TTL IS enabled, this job simply finds
# nothing to delete and exits immediately — no cost or harm.
[functions."scheduled-clear-rate-limits"]
  schedule = "0 * * * *"

[functions."process-email-queue"]
  schedule = "*/5 * * * *"

# Safety net for nowpayments-payout-webhook.js — polls NOWPayments for any
# payout whose status callback never arrived, so a deducted balance never
# sits unresolved indefinitely (see reconcile-stuck-payouts.js for details).
[functions."reconcile-stuck-payouts"]
  schedule = "*/20 * * * *"

# ── Headers ─────────────────────────────────────────────────────────────────
# Required so Firebase Messaging service worker can control the full origin
[[headers]]
  for = "/firebase-messaging-sw.js"
  [headers.values]
    Service-Worker-Allowed = "/"
    Cache-Control = "no-cache"


# ── Static asset caching ─────────────────────────────────────────────────────
# Images, JS, and icon assets are content-addressed (versioned by filename).
# Safe to cache for 1 year; HTML always revalidates so deploys propagate fast.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── Security headers ─────────────────────────────────────────────────────────
# Applied to every response. Protects against clickjacking, MIME-sniffing,
# protocol downgrade attacks, and unnecessary capability exposure.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

