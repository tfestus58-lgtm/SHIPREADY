# ── Social media OG preview routing ──────────────────────────────────────────
# Social crawlers (Facebook, WhatsApp, Twitter/X, LinkedIn, Telegram, Discord,
# iMessage, Slack) do NOT execute JavaScript. The OG meta tags on p.html,
# store.html, and profile.html are all set via JS, so crawlers only ever see
# the empty placeholder tags in the raw static HTML — producing no preview.
#
# Fix: route requests that carry a query param (?slug= / ?storeSlug= / ?uid=)
# through og-meta.js, which reads Firestore server-side (Admin SDK) and returns
# a minimal HTML page with fully-populated og:image, og:title, og:description,
# and Twitter Card tags. Human visitors are forwarded instantly to the real page
# via <meta http-equiv="refresh" content="0; url=..."> so there is zero UX
# difference for real users.
#
# Rule ordering: these rules must come BEFORE the plain /p, /store, /profile
# redirects below so Netlify intercepts query-param requests first.

# Product page — /p?slug=<productSlug>
[[redirects]]
  from   = "/p"
  to     = "/.netlify/functions/og-meta?type=product&slug=:slug"
  status = 200
  [redirects.query]
    slug = ":slug"

# Store page — /store?storeSlug=<storeSlug>
[[redirects]]
  from   = "/store"
  to     = "/.netlify/functions/og-meta?type=store&slug=:storeSlug"
  status = 200
  [redirects.query]
    storeSlug = ":storeSlug"

# Fallback: /p with no ?slug param — show static page
[[redirects]]
  from = "/p"
  to   = "/p.html"
  status = 200

# ISSUE 4 FIX: forward :slug as ?slug= so p.html (which reads
# new URLSearchParams(location.search).get('slug')) can resolve the product.
# Without this, /p/my-service redirected to /p.html with no query string,
# causing slug to be null and the page to immediately render a 404.
[[redirects]]
  from = "/p/:slug"
  to   = "/p.html?slug=:slug"
  status = 200

# Fallback: /store with no ?storeSlug param — show static page
[[redirects]]
  from = "/store"
  to   = "/store.html"
  status = 200

# ISSUE 4 FIX: forward :slug as ?storeSlug= so store.html (which reads
# params.get('storeSlug') || params.get('slug')) can resolve the seller store.
# Without this, /store/john redirected to /store.html with no query string,
# causing storeSlug and uid to both be null and the page to show empty.
[[redirects]]
  from = "/store/:slug"
  to   = "/store.html?storeSlug=:slug"
  status = 200

