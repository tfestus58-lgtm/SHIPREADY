<style>
*,*::before,*::after{box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8f9fb;color:#0d2145;margin:0;padding:0;-webkit-font-smoothing:antialiased}

/* Glass */
.glass{background:rgba(255,255,255,0.65);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.35);border-radius:20px;box-shadow:0 8px 32px rgba(13,33,69,0.08)}

/* Buttons */
.btn-green{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#2d8a5e;color:#fff;border:none;border-radius:50px;padding:11px 24px;font-family:'Plus Jakarta Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;box-shadow:0 4px 16px rgba(45,138,94,0.30);transition:transform .15s,box-shadow .15s,background .15s}
.btn-green:hover{background:#236b49;transform:translateY(-1px);box-shadow:0 6px 20px rgba(45,138,94,0.38)}
.btn-green:active{transform:translateY(0)}

.btn-secondary{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:transparent;color:#0d2145;border:2px solid #0d2145;border-radius:50px;padding:10px 22px;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;transition:transform .15s,background .15s,color .15s}
.btn-secondary:hover{background:#0d2145;color:#fff;transform:translateY(-1px)}
.btn-secondary:active{transform:translateY(0)}
.btn-sm{font-size:13px!important;padding:9px 18px!important}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:50px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap;flex-shrink:0}
.badge-green{background:#e8f5ef;color:#2d8a5e}
.badge-blue{background:#e8f0fe;color:#1a56db}
.badge-amber{background:#fff3cd;color:#856404}
.badge-red{background:#fde8e8;color:#c81e1e}
.badge-grey{background:rgba(13,33,69,0.07);color:rgba(13,33,69,0.55)}

/* Skeleton */
.sk{background:linear-gradient(90deg,#f0f2f6 25%,#e8eaf0 50%,#f0f2f6 75%);background-size:200% 100%;animation:sk 1.5s infinite linear;border-radius:8px}
@keyframes sk{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Nav */
.nav-link{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;font-size:13px;font-weight:600;color:rgba(255,255,255,0.52);text-decoration:none;transition:background .15s,color .15s;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-link:hover{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.88)}
.nav-link.active{background:rgba(45,138,94,0.22);color:#fff;border-left:3px solid #3dbd7a;padding-left:10px}

/* Mobile menu */
.slide-in{transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.slide-in.open{transform:translateX(0)}
.dim{opacity:0;pointer-events:none;transition:opacity .28s}
.dim.open{opacity:1;pointer-events:all}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#091830;color:#fff;border-radius:50px;padding:11px 22px;font-size:13px;font-weight:600;z-index:3000;opacity:0;pointer-events:none;transition:transform .25s,opacity .25s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* Fade up */
.fu{opacity:0;transform:translateY(18px);animation:fu .45s ease forwards}
@keyframes fu{to{opacity:1;transform:translateY(0)}}
.fu-1{animation-delay:.05s}.fu-2{animation-delay:.12s}.fu-3{animation-delay:.19s}

/* Blobs */
.blob-n{position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(13,33,69,0.09) 0%,transparent 70%);top:-100px;right:-100px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;will-change:transform}
.blob-g{position:absolute;width:440px;height:440px;background:radial-gradient(circle,rgba(45,138,94,0.07) 0%,transparent 70%);bottom:-60px;left:-80px;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;will-change:transform}

/* Credits bar */
.credits-bar{background:#f8f9fb;border-bottom:1px solid #e2e8f0;padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;border-radius:14px;border:1px solid #e2e8f0;margin-bottom:20px;}
.credits-track{background:rgba(13,33,69,0.08);border-radius:50px;height:6px;width:120px;overflow:hidden;flex-shrink:0;}
.credits-fill{background:#2d8a5e;height:100%;border-radius:50px;transition:width .3s ease;}

/* Pitch row */
.pitch-row{background:#fff;border-radius:14px;border:1px solid #e2e8f0;padding:16px 20px;margin-bottom:10px;cursor:pointer;transition:box-shadow .15s;}
.pitch-row:hover{box-shadow:0 6px 20px rgba(13,33,69,0.08);}
.pitch-row-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.pitch-title{font-size:15px;font-weight:700;color:#0d2145;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;}

/* Empty state */
.empty-state{padding:48px 24px;text-align:center;border-radius:20px;}

/* Hired card */
.hired-card{margin-top:12px;background:#e8f5ef;border:1px solid rgba(45,138,94,0.25);border-radius:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}

/* Responsive */
@media(min-width:1024px){
  #sidebar{display:flex!important}
  #hamburger{display:none!important}
  #main-wrap{margin-left:248px;width:calc(100% - 248px);max-width:none;overflow-x:visible}

@media(min-width:768px){

<script>
/* ══════════════════════════════════════════════

/* ══════════════════════════════════════════════
   HELPERS
══════════════════════════════════════════════ */
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
function toDateSafe(val) {
  if (!val) return null;
  if (typeof val === 'object' && typeof val._seconds === 'number') return new Date(val._seconds * 1000);
  if (typeof val === 'object' && typeof val.seconds === 'number') return new Date(val.seconds * 1000);
  var d = new Date(val);
  return isNaN(d.getTime()) ? null : d;
}
function relativeTime(val) {
  var d = toDateSafe(val);
  if (!d) return '';
  var diffMs = Date.now() - d.getTime();
  var diffSec = Math.floor(diffMs / 1000);
  if (diffSec < 60) return 'just now';
  var diffMin = Math.floor(diffSec / 60);
  if (diffMin < 60) return diffMin + (diffMin === 1 ? ' minute ago' : ' minutes ago');
  var diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr + (diffHr === 1 ? ' hour ago' : ' hours ago');
  var diffDay = Math.floor(diffHr / 24);
  if (diffDay < 30) return diffDay + (diffDay === 1 ? ' day ago' : ' days ago');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function categoryBadgeClass(cat) {
  if (cat === 'Design') return 'badge-green';
  if (cat === 'Development') return 'badge-blue';
  if (cat === 'Marketing') return 'badge-amber';
  return 'badge-grey';
}
function pitchStatusBadge(status) {
  if (status === 'shortlisted') return '<span class="badge badge-green">Shortlisted</span>';
  if (status === 'declined') return '<span class="badge badge-red">Declined</span>';
  if (status === 'accepted') return '<span class="badge badge-blue">Accepted &amp; Hired</span>';
  return '<span class="badge badge-grey">Pending</span>';
}
function fmtMoney(n) {
  n = Number(n) || 0;
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3500);
}

/* ══════════════════════════════════════════════
   BODY SCROLL LOCK (iOS-safe)
══════════════════════════════════════════════ */
function lockBodyScroll() {
  if (document.body.classList.contains('body-scroll-locked')) return;
  window._scrollLockY = window.pageYOffset || document.documentElement.scrollTop || 0;
  document.body.style.position = 'fixed';
  document.body.style.top = '-' + window._scrollLockY + 'px';
  document.body.style.left = '0';
  document.body.style.right = '0';
  document.body.style.width = '100%';
  document.body.classList.add('body-scroll-locked');
}
function unlockBodyScroll() {
  if (!document.body.classList.contains('body-scroll-locked')) return;
  document.body.classList.remove('body-scroll-locked');
  document.body.style.position = '';
  document.body.style.top = '';
  document.body.style.left = '';
  document.body.style.right = '';
  document.body.style.width = '';
  window.scrollTo(0, window._scrollLockY || 0);
  window._scrollLockY = 0;
}

/* ══════════════════════════════════════════════
   MOBILE MENU
══════════════════════════════════════════════ */
function openMobileMenu() {
  document.getElementById('mobile-menu').classList.add('open');
  document.getElementById('mobile-dim').classList.add('open');
  lockBodyScroll();
}
function closeMobileMenu() {
  document.getElementById('mobile-menu').classList.remove('open');
  document.getElementById('mobile-dim').classList.remove('open');
  unlockBodyScroll();
}

function buildNav(uid, affiliateEnabled) {
  var cur = (window.location.pathname.split('/').pop() || 'dashboard-briefs.html');
  var items = NAV.filter(function(n) {
    if (n.label === 'Affiliate') return affiliateEnabled === true;
    return true;
  });
  var html = items.map(function(n) {
    var href = n.href;
    if (n.label === 'Store' && uid) href = '/store.html?uid=' + uid;
    var active = cur === n.href.replace(/^\//,'') ? ' active' : '';
    return '<a href="'+href+'" class="nav-link'+active+'" onclick="closeMobileMenu()">'+n.icon+n.label+'</a>';
  }).join('');
  document.getElementById('mobile-nav').innerHTML  = html;
  document.getElementById('desktop-nav').innerHTML = html;
}

/* ══════════════════════════════════════════════
   CREDITS BAR — fetches /.netlify/functions/get-credits.
   That function is introduced in a later step; until then
   this fails silently and the bar simply shows a neutral
   dash rather than throwing an error.
══════════════════════════════════════════════ */
function loadCredits() {
  if (!window.auth || !window.auth.currentUser) return;
  window.auth.currentUser.getIdToken().then(function(idToken) {
    return fetch('/.netlify/functions/get-credits', {
      headers: { 'Authorization': 'Bearer ' + idToken }
    }).then(function(res) {
      if (!res.ok) throw new Error('not ready');
      return res.json();
    });
  }).then(function(data) {
    var total = Number(data.totalAvailable);
    var daily = Number(data.dailyCredits);
    if (!Number.isFinite(total)) return;
    document.getElementById('credits-remaining').textContent = total;
    var pct = Number.isFinite(daily) ? Math.max(0, Math.min(100, (daily / 10) * 100)) : 0;
    document.getElementById('credits-fill').style.width = pct + '%';
    var fillEl = document.getElementById('credits-fill');
    var textEl = document.getElementById('credits-text');
    if (daily <= 0) { fillEl.style.background = '#c81e1e'; textEl.style.color = '#c81e1e'; }
    else if (daily <= 3) { fillEl.style.background = '#856404'; textEl.style.color = '#856404'; }
    else { fillEl.style.background = '#2d8a5e'; textEl.style.color = '#2d8a5e'; }
  }).catch(function() {
    // get-credits.js not available yet — leave the neutral "--" state, no error surfaced.
  });
}

/* ══════════════════════════════════════════════
   LOAD MY PITCHES
   Collection group query across every briefs/{id}/pitches
   subcollection, filtered to this freelancer.
   NOTE: requires a Firestore collection group index on
   "pitches" by freelancerUid (+ submittedAt for ordering).
══════════════════════════════════════════════ */
async function loadMyPitches(uid) {
  var listEl = document.getElementById('pitches-list');
  var emptyEl = document.getElementById('pitches-empty');
  emptyEl.style.display = 'none';
  listEl.innerHTML = skeletonRow().repeat(4);

  if (!window.db || !window._fsQ) return;
  var fsQ = window._fsQ;

  try {
    var snap;
    try {
      snap = await fsQ.getDocs(
        fsQ.query(
          fsQ.collectionGroup(window.db, 'pitches'),
          fsQ.where('freelancerUid', '==', uid),
          fsQ.orderBy('submittedAt', 'desc'),
          fsQ.limit(50)
        )
      );
    } catch (indexErr) {
      if (indexErr && (indexErr.code === 'failed-precondition' || /FAILED_PRECONDITION/i.test(indexErr.message || ''))) {
        console.warn('[loadMyPitches] Collection group index not ready — falling back to unordered query.');
        snap = await fsQ.getDocs(
          fsQ.query(
            fsQ.collectionGroup(window.db, 'pitches'),
            fsQ.where('freelancerUid', '==', uid),
            fsQ.limit(50)
          )
        );
      } else {
        throw indexErr;
      }
    }

    myPitches = snap.docs.map(function(d) {
      var data = d.data();
      data.id = d.id;
      // Parent of a pitch doc is the "pitches" collection; its parent is the brief doc.
      data.briefId = d.ref.parent.parent ? d.ref.parent.parent.id : null;
      return data;
    });

    await hydrateBriefTitles(uid);
    renderMyPitches();
  } catch (err) {
    console.error('[loadMyPitches]', err);
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    document.getElementById('pitches-empty-title').textContent = 'Could not load your Pitches.';
    document.getElementById('pitches-empty-sub').textContent = 'Please refresh the page to try again.';
    showToast('Could not load your Pitches.');
  }
}

function skeletonRow() {
  return '<div class="pitch-row"><div class="sk" style="height:15px;width:55%;margin-bottom:8px;"></div><div class="sk" style="height:11px;width:35%;margin-bottom:6px;"></div><div class="sk" style="height:11px;width:25%;"></div></div>';
}

/* Fetch title/category for each unique briefId referenced by myPitches */
async function hydrateBriefTitles(uid) {
  if (!window.db || !window._fsQ) return;
  var fsQ = window._fsQ;
  var uniqueIds = [];
  myPitches.forEach(function(p) {
    if (p.briefId && uniqueIds.indexOf(p.briefId) === -1 && !briefTitleCache[p.briefId]) {
      uniqueIds.push(p.briefId);
    }
  });
  await Promise.all(uniqueIds.map(function(briefId) {
    return fsQ.getDoc(fsQ.doc(window.db, 'briefs', briefId)).then(function(snap) {
      if (snap.exists()) {
        var d = snap.data();
        briefTitleCache[briefId] = { title: d.title || 'Untitled Brief', category: d.category || 'Other' };
      } else {
        briefTitleCache[briefId] = { title: 'Brief no longer available', category: 'Other' };
      }
    }).catch(function() {
      briefTitleCache[briefId] = { title: 'Untitled Brief', category: 'Other' };
    });
  }));
}

function renderMyPitches() {
  var listEl = document.getElementById('pitches-list');
  var emptyEl = document.getElementById('pitches-empty');

  if (!myPitches.length) {
    listEl.innerHTML = '';
    document.getElementById('pitches-empty-title').textContent = "You haven't submitted any Pitches yet.";
    document.getElementById('pitches-empty-sub').textContent = 'Browse Briefs to find work.';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  listEl.innerHTML = myPitches.map(function(p) {
    var meta = briefTitleCache[p.briefId] || { title: 'Untitled Brief', category: 'Other' };
    var hiredBlock = '';
    if (p.status === 'accepted') {
      hiredBlock =
        '<div class="hired-card">' +
          '<div>' +
            '<div style="font-size:13px;font-weight:700;color:#2d8a5e;">You got hired!</div>' +
            '<div style="font-size:12px;font-weight:500;color:rgba(13,33,69,0.55);">A project has been created.</div>' +
          '</div>' +
          '<a href="/dashboard-projects.html" class="btn-green btn-sm" style="display:inline-flex;" onclick="event.stopPropagation()">View Project</a>' +
        '</div>';
    }
    return (
      '<div class="pitch-row" onclick="window.location.href=\'/brief.html?id=' + encodeURIComponent(p.briefId || '') + '\'">' +
        '<div class="pitch-row-top">' +
          '<div style="min-width:0;flex:1;">' +
            '<div class="pitch-title">' + escHtml(meta.title) + '</div>' +
            '<div style="margin-top:6px;"><span class="badge ' + categoryBadgeClass(meta.category) + '">' + escHtml(meta.category) + '</span></div>' +
          '</div>' +
          '<div>' + pitchStatusBadge(p.status) + '</div>' +
        '</div>' +
        '<div style="font-size:13px;color:rgba(13,33,69,0.55);margin-top:10px;">Proposed: ' + fmtMoney(p.proposedBudget) + ' · ' + escHtml(p.proposedTimeline || '') + '</div>' +
        '<div style="font-size:12px;color:rgba(13,33,69,0.45);margin-top:4px;">Submitted ' + relativeTime(p.submittedAt) + '</div>' +
        hiredBlock +
      '</div>'
    );
  }).join('');
}
